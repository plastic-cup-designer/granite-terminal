<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .frame {
    position: relative;
    width: min(80vw, 80vh);
    height: min(80vw, 80vh);
    background: #000;
  }

  .frame img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    /* Reveal grows from 0% (fully clipped/hidden) to 100% (fully shown),
       top to bottom, like an old slow image load. */
    clip-path: inset(0 0 100% 0);
    animation: reveal 7s linear forwards;
  }

  @keyframes reveal {
    0%   { clip-path: inset(0 0 100% 0); }
    100% { clip-path: inset(0 0 0% 0); }
  }
</style>
</head>
<body>
  <div class="frame">
    <img src="assets/ondas.jpg" alt="">
  </div>
</body>
</html>
